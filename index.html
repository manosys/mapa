<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Eventos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0f14;
            --surface:  #151820;
            --border:   rgba(255,255,255,0.07);
            --accent:   #7c6dfa;
            --accent2:  #fa6d9b;
            --text:     #e8eaf0;
            --muted:    #7a7e91;
            --green:    #4ade80;
            --radius:   14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
        }

        #map { width: 100%; height: 100%; }

        /* ── Tiles oscuros via CSS filter ── */
        .leaflet-tile { filter: brightness(0.75) saturate(0.6) hue-rotate(200deg); }
        .leaflet-container { background: #0d0f14; }

        /* ── Loading ── */
        .loading-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 18px;
        }
        .loading-logo {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 2px solid rgba(124,109,250,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        #loading-text {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.06em;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Header pill flotante ── */
        .header-pill {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 18px 8px 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            pointer-events: none;
            white-space: nowrap;
        }
        .header-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.75); }
        }
        .header-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text);
        }



        /* ── Contador ── */
        .contador {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 7px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none;
            white-space: nowrap;
        }
        .contador span { color: var(--accent); font-family: 'DM Mono', monospace; }

        /* ── Popup ── */
        .leaflet-popup-content-wrapper {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius) !important;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6) !important;
            padding: 0 !important;
            overflow: hidden;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 0 !important; min-width: 200px; }
        .leaflet-popup-close-button {
            color: var(--muted) !important;
            font-size: 18px !important;
            top: 10px !important;
            right: 12px !important;
            padding: 0 !important;
            width: auto !important;
            height: auto !important;
            line-height: 1 !important;
        }
        .leaflet-popup-close-button:hover { color: var(--text) !important; background: none !important; }

        .popup-wrap { font-family: 'DM Sans', sans-serif; }
        .popup-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(124,109,250,0.12), rgba(250,109,155,0.06));
        }
        .popup-nombre {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            padding-right: 18px;
            line-height: 1.3;
        }
        .popup-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(124,109,250,0.15);
            border-radius: 6px;
            padding: 2px 8px;
        }
        .popup-body { padding: 10px 16px 14px; }
        .popup-fila {
            display: flex; align-items: flex-start; gap: 8px;
            margin: 6px 0; font-size: 12px; color: var(--muted);
            line-height: 1.45;
        }
        .popup-fila-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
        .popup-precio {
            font-size: 20px; font-weight: 600;
            color: var(--green);
            font-family: 'DM Mono', monospace;
            margin-top: 10px;
            text-align: center;
            background: rgba(74,222,128,0.08);
            border-radius: 8px;
            padding: 6px;
        }

        /* ── Marker custom ── */
        .marker-pin {
            width: 32px; height: 32px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
        }
        .marker-inner {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: white;
            transform: rotate(45deg);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
        }

        /* ── Zoom controls ── */
        .leaflet-control-zoom {
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
        }
        .leaflet-control-zoom a {
            background: var(--surface) !important;
            color: var(--muted) !important;
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
            border-bottom: 1px solid var(--border) !important;
            font-size: 16px !important;
            transition: color 0.15s, background 0.15s !important;
        }
        .leaflet-control-zoom a:hover {
            background: rgba(124,109,250,0.15) !important;
            color: var(--accent) !important;
        }
        .leaflet-control-zoom-out { border-bottom: none !important; }
        .leaflet-control-attribution {
            background: var(--surface) !important;
            color: var(--muted) !important;
            border-top: 1px solid var(--border) !important;
            font-size: 10px !important;
        }
        .leaflet-control-attribution a { color: var(--accent) !important; }

        /* ── Radar / pulso de marcadores ── */
        @keyframes radar {
            0%   { transform: scale(1);   opacity: 0.6; }
            100% { transform: scale(2.8); opacity: 0;   }
        }
        .marker-radar {
            position: absolute; inset: 0; border-radius: 50%;
            animation: radar 2s ease-out infinite;
        }
        .marker-radar-2 {
            position: absolute; inset: 0; border-radius: 50%;
            animation: radar 2s ease-out infinite;
            animation-delay: 1s;
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loading">
        <div class="spinner"></div>
        <div class="loading-logo">Mapa de Eventos</div>
        <div id="loading-text">Cargando eventos...</div>
    </div>

    <div id="map"></div>

    <div class="header-pill" id="header-pill" style="display:none">
        <div class="header-dot"></div>
        <div class="header-label">Eventos en vivo</div>
    </div>



    <div class="contador" id="contador"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_xfabgSBXqErxyp9NmafAIuXtkwFmB_Zy-MGX1n3kcQMeZx7z9l-OoIu0lPxofeBgybp6bXbNFuNh/pub?gid=1622011769&single=true&output=csv';

    const COL_CATEGORIA = 0;
    const COL_DIRECCION = 1;
    const COL_LAT       = 2;
    const COL_LNG       = 3;
    const COL_BARRIO    = 4;
    const COL_PRECIO    = 5;
    const COL_COMUNA    = 6;

    const map = L.map('map', { zoomControl: false }).setView([-34.6037, -58.3816], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
        maxZoom: 19
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Marcador con emoji por categoría
    const CATEGORIA_EMOJI = {
        'evento online / híbrido':       { emoji: '💻', color: '#60a5fa' },
        'música y danza':                { emoji: '🎵', color: '#f472b6' },
        'taller y workshop':             { emoji: '🛠️', color: '#fb923c' },
        'educativo y charlas':           { emoji: '📚', color: '#34d399' },
        'gaming y entretenimiento':      { emoji: '🎮', color: '#a78bfa' },
        'cultura y comunidad':           { emoji: '🏛️', color: '#fbbf24' },
        'espiritualidad y meditación':   { emoji: '🧘', color: '#6ee7b7' },
        'naturaleza y aire libre':       { emoji: '🌿', color: '#4ade80' },
        'arte y creatividad':            { emoji: '🎨', color: '#f87171' },
        'encuentro social':              { emoji: '🤝', color: '#38bdf8' },
    };

    function crearIcono(categoria) {
        const key    = (categoria || '').toLowerCase().trim();
        const cfg    = CATEGORIA_EMOJI[key] || { emoji: '📍', color: '#7c6dfa' };

        return L.divIcon({
            className: '',
            html: `
            <div style="position:relative; width:36px; height:36px; display:flex; align-items:center; justify-content:center;">
                <div class="marker-radar"  style="background:${cfg.color};"></div>
                <div class="marker-radar-2" style="background:${cfg.color};"></div>
                <div style="
                    position: relative;
                    z-index: 2;
                    width: 36px; height: 36px;
                    border-radius: 50%;
                    background: ${cfg.color}28;
                    border: 2px solid ${cfg.color};
                    box-shadow: 0 3px 10px rgba(0,0,0,0.5);
                    display: flex; align-items: center; justify-content: center;
                    font-size: 17px; line-height: 1;
                ">${cfg.emoji}</div>
            </div>`,
            iconSize:    [36, 36],
            iconAnchor:  [18, 18],
            popupAnchor: [0, -22]
        });
    }

    function parseCoordenada(valor) {
        if (!valor) return NaN;
        return parseFloat(valor.toString().replace(/"/g, '').replace(',', '.'));
    }

    function crearPopup(datos) {
        return `
            <div class="popup-wrap">
                <div class="popup-header">
                    <div class="popup-nombre">${datos.categoria || 'Evento'}</div>
                    ${datos.barrio ? `<span class="popup-badge">${datos.barrio}</span>` : ''}
                </div>
                <div class="popup-body">
                    ${datos.direccion ? `<div class="popup-fila"><span class="popup-fila-icon">📍</span><span>${datos.direccion}</span></div>` : ''}
                    ${datos.comuna    ? `<div class="popup-fila"><span class="popup-fila-icon">🏛</span><span>Comuna ${datos.comuna}</span></div>` : ''}
                    ${datos.precio    ? `<div class="popup-precio">$${datos.precio}</div>` : ''}
                </div>
            </div>`;
    }

    function parseCSVLine(line) {
        const result = [];
        let cell = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i], next = line[i+1];
            if      (char === '"' && !inQuotes)               { inQuotes = true; }
            else if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; }
            else if (char === '"' && inQuotes)                 { inQuotes = false; }
            else if (char === ',' && !inQuotes)                { result.push(cell); cell = ''; }
            else                                               { cell += char; }
        }
        result.push(cell);
        return result;
    }

    // ===== DETECTAR MODO =====
    const urlParams      = new URLSearchParams(window.location.search);
    const categoriaParam = urlParams.get('categoria') || '';
    const modoDetalle    = categoriaParam.trim() !== '';

    // ── MODO 1: DETALLE DE EVENTO ──
    if (modoDetalle) {
        document.getElementById('loading-text').textContent = 'Cargando evento...';

        fetch(sheetURL)
            .then(r => { if (!r.ok) throw new Error('Error HTTP: ' + r.status); return r.text(); })
            .then(csvText => {
                document.getElementById('loading').style.display = 'none';

                const lines     = csvText.trim().split('\n');
                const dataLines = lines.slice(1);
                const categoriaBuscado = categoriaParam.trim().toLowerCase();
                let encontrado = false;

                for (const line of dataLines) {
                    if (!line.trim()) continue;
                    const cols      = parseCSVLine(line);
                    const categoria = cols[COL_CATEGORIA]?.replace(/"/g,'').trim() || '';
                    const dir       = cols[COL_DIRECCION]?.replace(/"/g,'').trim() || '';
                    const lat       = parseCoordenada(cols[COL_LAT]);
                    const lng       = parseCoordenada(cols[COL_LNG]);
                    const barrio    = cols[COL_BARRIO]   ?.replace(/"/g,'').trim() || '';
                    const precio    = cols[COL_PRECIO]   ?.replace(/"/g,'').trim() || '';
                    const comuna    = cols[COL_COMUNA]   ?.replace(/"/g,'').trim() || '';

                    if (categoria.toLowerCase() === categoriaBuscado && !isNaN(lat) && !isNaN(lng)) {
                        map.setView([lat, lng], 16);
                        L.marker([lat, lng], { icon: crearIcono(categoria) })
                            .addTo(map)
                            .bindPopup(crearPopup({ categoria, direccion: dir, barrio, precio, comuna }), { maxWidth: 280 })
                            .openPopup();
                        encontrado = true;
                        break;
                    }
                }

                if (!encontrado) {
                    for (const line of dataLines) {
                        if (!line.trim()) continue;
                        const cols      = parseCSVLine(line);
                        const categoria = cols[COL_CATEGORIA]?.replace(/"/g,'').trim() || '';
                        const lat       = parseCoordenada(cols[COL_LAT]);
                        const lng       = parseCoordenada(cols[COL_LNG]);

                        if (categoria.toLowerCase().includes(categoriaBuscado) && !isNaN(lat) && !isNaN(lng)) {
                            const dir    = cols[COL_DIRECCION]?.replace(/"/g,'').trim() || '';
                            const barrio = cols[COL_BARRIO]   ?.replace(/"/g,'').trim() || '';
                            const precio = cols[COL_PRECIO]   ?.replace(/"/g,'').trim() || '';
                            const comuna = cols[COL_COMUNA]   ?.replace(/"/g,'').trim() || '';
                            map.setView([lat, lng], 16);
                            L.marker([lat, lng], { icon: crearIcono(categoria) })
                                .addTo(map)
                                .bindPopup(crearPopup({ categoria, direccion: dir, barrio, precio, comuna }), { maxWidth: 280 })
                                .openPopup();
                            break;
                        }
                    }
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                console.error('❌ Error:', err);
            });
    }

    // ── MODO 2: TODOS LOS EVENTOS (con buscador) ──
    else {
        let todosLosEventos = [];
        let todosLosMarkers = [];

        fetch(sheetURL)
            .then(r => { if (!r.ok) throw new Error('Error HTTP: ' + r.status); return r.text(); })
            .then(csvText => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('header-pill').style.display = 'flex';

                const lines     = csvText.trim().split('\n');
                const dataLines = lines.slice(1);

                dataLines.forEach(line => {
                    if (!line.trim()) return;
                    const cols      = parseCSVLine(line);
                    const categoria = cols[COL_CATEGORIA]?.replace(/"/g,'').trim() || '';
                    const dir       = cols[COL_DIRECCION]?.replace(/"/g,'').trim() || '';
                    const lat       = parseCoordenada(cols[COL_LAT]);
                    const lng       = parseCoordenada(cols[COL_LNG]);
                    const barrio    = cols[COL_BARRIO]   ?.replace(/"/g,'').trim() || '';
                    const precio    = cols[COL_PRECIO]   ?.replace(/"/g,'').trim() || '';
                    const comuna    = cols[COL_COMUNA]   ?.replace(/"/g,'').trim() || '';

                    if (!isNaN(lat) && !isNaN(lng)) {
                        todosLosEventos.push({ categoria: categoria || dir, direccion: dir, lat, lng, barrio, precio, comuna });
                    }
                });

                mostrarEventos(todosLosEventos);
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                console.error('❌ Error cargando eventos:', err);
            });

        function mostrarEventos(eventos) {
            todosLosMarkers.forEach(m => map.removeLayer(m));
            todosLosMarkers = [];
            const bounds = [];

            eventos.forEach((ev, i) => {
                const marker = L.marker([ev.lat, ev.lng], { icon: crearIcono(ev.categoria) })
                    .addTo(map)
                    .bindPopup(crearPopup(ev), { maxWidth: 280 });
                todosLosMarkers.push(marker);
                bounds.push([ev.lat, ev.lng]);
            });

            if (bounds.length > 0) map.fitBounds(bounds, { padding: [60, 60] });

            const contador = document.getElementById('contador');
            contador.style.display = 'none';
        }

        mostrarEventos(todosLosEventos);
</script>
</body>
</html>

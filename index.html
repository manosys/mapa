</head>

        <div id="loading-text">Cargando eventos...</div>

    <div id="map"></div>

    <div class="buscador" id="buscador" style="display:none">
        <span>🔍</span>
        <input type="text" id="inputBarrio" placeholder="Buscar por barrio..." />
        <span class="limpiar" id="limpiar">✕</span>
    </div>

    <div class="contador" id="contador"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT_xfabgSBXqErxyp9NmafAIuXtkwFmB_Zy-MGX1n3kcQMeZx7z9l-OoIu0lPxofeBgybp6bXbNFuNh/pub?gid=1622011769&single=true&output=csv';

    const COL_CATEGORIA = 0;
    const COL_DIRECCION = 1;
    const COL_LAT       = 2;
    const COL_LNG       = 3;
    const COL_BARRIO    = 4;
    const COL_PRECIO    = 5;
    const COL_COMUNA    = 6;

    const map = L.map('map').setView([-34.6037, -58.3816], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors', maxZoom: 19
    }).addTo(map);

    function parseCoordenada(valor) {
        if (!valor) return NaN;
        return parseFloat(valor.toString().replace(/"/g, '').replace(',', '.'));
    }

    function crearPopup(datos) {
        return `
            <div class="popup-wrap">
                <div class="popup-nombre">${datos.categoria || 'Evento'}</div>
                ${datos.direccion ? `<div class="popup-fila">📍 <span>${datos.direccion}</span></div>` : ''}
                ${datos.barrio    ? `<div class="popup-fila">🏘️ <span>${datos.barrio}</span></div>`    : ''}
                ${datos.comuna    ? `<div class="popup-fila">🏛️ <span>Comuna ${datos.comuna}</span></div>` : ''}
                ${datos.precio    ? `<div class="popup-precio">$${datos.precio}</div>`                 : ''}
            </div>`;
    }

    function parseCSVLine(line) {
        const result = [];
        let cell = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i], next = line[i+1];
            if      (char === '"' && !inQuotes)               { inQuotes = true; }
            else if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; }
            else if (char === '"' && inQuotes)                 { inQuotes = false; }
            else if (char === ',' && !inQuotes)                { result.push(cell); cell = ''; }
            else                                               { cell += char; }
        }
        result.push(cell);
        return result;
    }

    // ===== DETECTAR MODO =====
    const urlParams      = new URLSearchParams(window.location.search);
    const categoriaParam = urlParams.get('categoria') || '';
    const modoDetalle    = categoriaParam.trim() !== '';

    // ── MODO 1: DETALLE DE EVENTO ──
    if (modoDetalle) {
        document.getElementById('loading-text').textContent = 'Cargando evento...';

        fetch(sheetURL)
            .then(r => { if (!r.ok) throw new Error('Error HTTP: ' + r.status); return r.text(); })
            .then(csvText => {
                document.getElementById('loading').style.display = 'none';

                const lines     = csvText.trim().split('\n');
                const dataLines = lines.slice(1);
                const categoriaBuscada = categoriaParam.trim().toLowerCase();
                let encontrado = false;

                for (const line of dataLines) {
                    if (!line.trim()) continue;
                    const cols     = parseCSVLine(line);
                    const categoria = cols[COL_CATEGORIA]?.replace(/"/g,'').trim() || '';
                    const dir      = cols[COL_DIRECCION]?.replace(/"/g,'').trim() || '';
                    const lat      = parseCoordenada(cols[COL_LAT]);
                    const lng      = parseCoordenada(cols[COL_LNG]);
                    const barrio   = cols[COL_BARRIO]?.replace(/"/g,'').trim() || '';
                    const precio   = cols[COL_PRECIO]?.replace(/"/g,'').trim() || '';
                    const comuna   = cols[COL_COMUNA]?.replace(/"/g,'').trim() || '';

                    if (categoria.toLowerCase() === categoriaBuscada && !isNaN(lat) && !isNaN(lng)) {
                        map.setView([lat, lng], 16);
                        L.marker([lat, lng])
                            .addTo(map)
                            .bindPopup(crearPopup({ categoria, direccion: dir, barrio, precio, comuna }), { maxWidth: 260 })
                            .openPopup();
                        encontrado = true;
                        break;
                    }
                }

                if (!encontrado) {
                    for (const line of dataLines) {
                        if (!line.trim()) continue;
                        const cols     = parseCSVLine(line);
                        const categoria = cols[COL_CATEGORIA]?.replace(/"/g,'').trim() || '';
                        const lat      = parseCoordenada(cols[COL_LAT]);
                        const lng      = parseCoordenada(cols[COL_LNG]);

                        if (categoria.toLowerCase().includes(categoriaBuscada) && !isNaN(lat) && !isNaN(lng)) {
                            const dir    = cols[COL_DIRECCION]?.replace(/"/g,'').trim() || '';
                            const barrio = cols[COL_BARRIO]?.replace(/"/g,'').trim() || '';
                            const precio = cols[COL_PRECIO]?.replace(/"/g,'').trim() || '';
                            const comuna = cols[COL_COMUNA]?.replace(/"/g,'').trim() || '';
                            map.setView([lat, lng], 16);
                            L.marker([lat, lng])
                                .addTo(map)
                                .bindPopup(crearPopup({ categoria, direccion: dir, barrio, precio, comuna }), { maxWidth: 260 })
                                .openPopup();
                            break;
                        }
                    }
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                console.error('❌ Error:', err);
            });
    }

    // ── MODO 2: TODOS LOS EVENTOS ──
    else {
        let todosLosEventos = [];
        let todosLosMarkers = [];

        fetch(sheetURL)
            .then(r => { if (!r.ok) throw new Error('Error HTTP: ' + r.status); return r.text(); })
            .then(csvText => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('buscador').style.display = 'flex';

                const lines     = csvText.trim().split('\n');
                const dataLines = lines.slice(1);

                dataLines.forEach(line => {
                    if (!line.trim()) return;
                    const cols     = parseCSVLine(line);
                    const categoria = cols[COL_CATEGORIA]?.replace(/"/g,'').trim() || '';
                    const dir      = cols[COL_DIRECCION]?.replace(/"/g,'').trim() || '';
                    const lat      = parseCoordenada(cols[COL_LAT]);
                    const lng      = parseCoordenada(cols[COL_LNG]);
                    const barrio   = cols[COL_BARRIO]?.replace(/"/g,'').trim() || '';
                    const precio   = cols[COL_PRECIO]?.replace(/"/g,'').trim() || '';
                    const comuna   = cols[COL_COMUNA]?.replace(/"/g,'').trim() || '';

                    if (!isNaN(lat) && !isNaN(lng)) {
                        todosLosEventos.push({ categoria: categoria || dir, direccion: dir, lat, lng, barrio, precio, comuna });
                    }
                });

                mostrarEventos(todosLosEventos);
            })

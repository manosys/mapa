<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento guardado</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* estilos igual que antes */
  </style>
</head>
<body>

  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div>Guardando evento...</div>
  </div>

  <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLKZ2RjjLm7EVTZbKJ3HSUeZyk8WgwvJ0KSFAe0fx_OOevl7y4tXhwyXdcQli7B81BIQ/exec';

  const p          = new URLSearchParams(window.location.search);
  const categoria  = p.get('categoria') || '';
  const direccion  = p.get('direccion') || '';
  const precio     = p.get('precio')    || '';

  const map = L.map('map', { zoomControl: true }).setView([-34.6037, -58.3816], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const url = SCRIPT_URL
    + '?categoria=' + encodeURIComponent(categoria)
    + '&direccion=' + encodeURIComponent(direccion)
    + '&precio='    + encodeURIComponent(precio);

  fetch(url)
    .then(r => r.text())
    .then(html => {
      const ok = html.includes('Evento Guardado') || html.includes('evento guardado');
      if (!ok) throw new Error('Respuesta inesperada del servidor');

      let lat = null, lng = null, barrio = '', comuna = '';

      const jsonMatch = html.match(/<div id="datos-json"[^>]*>([\s\S]*?)<\/div>/);
      if (jsonMatch) {
        try {
          const datos = JSON.parse(jsonMatch[1].trim());
          lat    = datos.lat    ? parseFloat(datos.lat)  : null;
          lng    = datos.lng    ? parseFloat(datos.lng)  : null;
          barrio = datos.barrio || '';
          comuna = datos.comuna || '';
        } catch(e) {
          console.warn('No se pudo parsear datos-json:', e);
        }
      }

      if (!lat) {
        const latM = html.match(/Lat:\s*([-\d.]+)/);
        const lngM = html.match(/Lng:\s*([-\d.]+)/);
        const comM = html.match(/Comuna\s*(\d+)/);
        lat    = latM ? parseFloat(latM[1]) : null;
        lng    = lngM ? parseFloat(lngM[1]) : null;
        comuna = comM ? comM[1] : '';
      }

      document.getElementById('loading').style.display = 'none';

      if (lat && lng) {
        map.setView([lat, lng], 16);

        const popupHTML = `
          <div class="popup-wrap">
            <div class="popup-nombre">${categoria}</div>
            ${direccion ? `<div class="popup-fila">📍 <span>${direccion}</span></div>` : ''}
            ${barrio    ? `<div class="popup-fila">🏘️ <span>${barrio}</span></div>`    : ''}
            ${comuna    ? `<div class="popup-fila">🏛️ <span>Comuna ${comuna}</span></div>` : ''}
            ${precio    ? `<div class="popup-precio">$${precio}</div>`                 : ''}
          </div>`;

        L.marker([lat, lng])
          .addTo(map)
          .bindPopup(popupHTML, { maxWidth: 260 })
          .openPopup();
      } else {
        map.setView([-34.6037, -58.3816], 12);
        L.popup({ closeButton: false })
          .setLatLng([-34.6037, -58.3816])
          .setContent('<div style="font-family:sans-serif;text-align:center;padding:6px">⚠️ Dirección no encontrada en la base</div>')
          .openOn(map);
      }
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      document.body.insertAdjacentHTML('beforeend', `
        <div class="error-card">
          <div class="error-inner">
            <div class="error-icon">❌</div>
            <div class="error-title">Error al guardar</div>
            <div class="error-msg">${err.message}</div>
          </div>
        </div>`);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento guardado</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    .loading-screen {
      position: fixed; inset: 0; z-index: 2000;
      background: #f0f4f8;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #555;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #dde3ea;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .popup-wrap { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-width: 180px; }
    .popup-nombre { font-size: 15px; font-weight: bold; color: #1a1a2e; margin-bottom: 8px; border-bottom: 2px solid #667eea; padding-bottom: 6px; }
    .popup-fila { display: flex; align-items: flex-start; gap: 6px; margin: 5px 0; font-size: 13px; color: #444; }
    .popup-fila span { line-height: 1.4; }
    .popup-precio { font-size: 17px; font-weight: bold; color: #27ae60; margin-top: 8px; text-align: center; }

    .error-card {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .error-inner {
      background: white; border-radius: 16px; padding: 30px 24px;
      text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      max-width: 320px;
    }
    .error-icon { font-size: 48px; margin-bottom: 12px; }
    .error-title { font-size: 18px; font-weight: bold; color: #e74c3c; margin-bottom: 8px; }
    .error-msg { font-size: 13px; color: #888; }
  </style>
</head>
<body>

  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div>Guardando evento...</div>
  </div>

  <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwiuV-P8CrxMR2OgBDX0bCd3WCLKCVsj1L1gKviYaB6soL-QDr_hgQZpU0X4vdRQvCLJA/exec';

  const p         = new URLSearchParams(window.location.search);
  const categoria      = p.get('categoria')      || '';
  const direccion = p.get('direccion') || '';
  const precio    = p.get('precio')    || '';

  const map = L.map('map', { zoomControl: true }).setView([-34.6037, -58.3816], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const url = SCRIPT_URL
    + '?categoria='      + encodeURIComponent(categoria)
    + '&direccion=' + encodeURIComponent(direccion)
    + '&precio='    + encodeURIComponent(precio);

  fetch(url)
    .then(r => r.text())
    .then(html => {
      const ok = html.includes('Evento Guardado') || html.includes('evento guardado');
      if (!ok) throw new Error('Respuesta inesperada del servidor');

      // ── Leer datos desde el tag JSON embebido por el script ──
      let lat = null, lng = null, barrio = '', comuna = '';

      const jsonMatch = html.match(/<div id="datos-json"[^>]*>([\s\S]*?)<\/div>/);
      if (jsonMatch) {
        try {
          const datos = JSON.parse(jsonMatch[1].trim());
          lat    = datos.lat    ? parseFloat(datos.lat)  : null;
          lng    = datos.lng    ? parseFloat(datos.lng)  : null;
          barrio = datos.barrio || '';
          comuna = datos.comuna || '';
        } catch(e) {
          console.warn('No se pudo parsear datos-json:', e);
        }
      }

      // ── Fallback con regex si el tag JSON no está disponible ──
      if (!lat) {
        const latM = html.match(/Lat:\s*([-\d.]+)/);
        const lngM = html.match(/Lng:\s*([-\d.]+)/);
        const comM = html.match(/Comuna\s*(\d+)/);
        lat    = latM ? parseFloat(latM[1]) : null;
        lng    = lngM ? parseFloat(lngM[1]) : null;
        comuna = comM ? comM[1] : '';
      }

      document.getElementById('loading').style.display = 'none';

      if (lat && lng) {
        map.setView([lat, lng], 16);

        const popupHTML = `
          <div class="popup-wrap">
            <div class="popup-nombre">${categoria}</div>
            ${direccion ? `<div class="popup-fila">📍 <span>${direccion}</span></div>` : ''}
            ${barrio    ? `<div class="popup-fila">🏘️ <span>${barrio}</span></div>`    : ''}
            ${comuna    ? `<div class="popup-fila">🏛️ <span>Comuna ${comuna}</span></div>` : ''}
            ${precio    ? `<div class="popup-precio">$${precio}</div>`                 : ''}
          </div>`;

        L.marker([lat, lng])
          .addTo(map)
          .bindPopup(popupHTML, { maxWidth: 260 })
          .openPopup();
      } else {
        map.setView([-34.6037, -58.3816], 12);
        L.popup({ closeButton: false })
          .setLatLng([-34.6037, -58.3816])
          .setContent('<div style="font-family:sans-serif;text-align:center;padding:6px">⚠️ Dirección no encontrada en la base</div>')
          .openOn(map);
      }
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      document.body.insertAdjacentHTML('beforeend', `
        <div class="error-card">
          <div class="error-inner">
            <div class="error-icon">❌</div>
            <div class="error-title">Error al guardar</div>
            <div class="error-msg">${err.message}</div>
          </div>
        </div>`);
    });
</script>
</body>
</html>
